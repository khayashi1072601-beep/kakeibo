<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計管理アプリ v3</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
    header{background:linear-gradient(135deg,#1565C0,#0277BD);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    header h1{font-size:18px;font-weight:700}
    .header-btns{display:flex;gap:8px}
    .btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
    .btn-white{background:#fff;color:#1565C0}
    .btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.7)}
    .btn-primary{background:#1565C0;color:#fff}
    .btn-danger{background:#c62828;color:#fff}
    .btn-sm{padding:4px 10px;font-size:12px}

    /* Period bar */
    .period-bar{background:#fff;border-bottom:1px solid #ddd;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .period-bar button{background:none;border:1px solid #aaa;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:13px}
    .period-bar button:hover{background:#eee}
    .period-label{font-weight:700;font-size:14px;color:#1565C0}
    .period-sub{font-size:12px;color:#666}

    /* Account strip */
    .account-strip{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap}
    .acc-card{min-width:140px;border-radius:10px;padding:10px 14px;color:#fff;position:relative;cursor:pointer;user-select:none;flex-shrink:0}
    .acc-card .acc-owner{font-size:10px;opacity:.8;margin-bottom:2px}
    .acc-card .acc-name{font-size:13px;font-weight:700}
    .acc-card .acc-bal{font-size:17px;font-weight:700;margin-top:4px}
    .acc-card .acc-bal span{font-size:11px;font-weight:400}
    .add-acc-card{min-width:100px;border-radius:10px;padding:10px 14px;background:#e8f0fe;color:#1565C0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;font-weight:700;flex-shrink:0;border:2px dashed #90CAF9}

    /* Summary section */
    .summary-section{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:600px){.summary-section{grid-template-columns:1fr}}
    .summary-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .summary-card h3{font-size:13px;color:#666;margin-bottom:8px;font-weight:600}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0f0}
    .summary-row:last-child{border-bottom:none;font-weight:700;padding-top:8px}
    .amount-pos{color:#1565C0}
    .amount-neg{color:#c62828}
    .amount-neutral{color:#333}
    .owner-badge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600}

    /* Main content */
    .main{padding:0 16px 16px}

    /* Input form */
    .input-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
    .tab-bar{display:flex;gap:4px;margin-bottom:14px;background:#f0f2f5;padding:4px;border-radius:8px}
    .tab-btn{flex:1;padding:7px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#666;transition:all .15s}
    .tab-btn.active{background:#fff;color:#1565C0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    .form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
    .form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
    .form-group label{font-size:12px;color:#666;font-weight:600}
    .form-group input,.form-group select{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:14px;outline:none;transition:border-color .15s}
    .form-group input:focus,.form-group select:focus{border-color:#1565C0}
    .form-group.sm{max-width:110px}
    .submit-btn{padding:8px 18px;background:#1565C0;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap}
    .submit-btn:hover{background:#1976D2}

    /* Transaction list */
    .list-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
    .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .list-header h2{font-size:15px;font-weight:700}
    .filter-btns{display:flex;gap:4px;flex-wrap:wrap}
    .filter-btn{padding:4px 10px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#666}
    .filter-btn.active{background:#1565C0;color:#fff;border-color:#1565C0}
    .tx-item{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5;gap:8px}
    .tx-item:last-child{border-bottom:none}
    .tx-left{display:flex;align-items:center;gap:10px;min-width:0}
    .tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .tx-icon.income{background:#E8F5E9}
    .tx-icon.expense{background:#FFEBEE}
    .tx-icon.transfer{background:#E3F2FD}
    .tx-info{min-width:0}
    .tx-info .tx-cat{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-info .tx-meta{font-size:11px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-right{text-align:center;white-space:nowrap}
    .tx-amount{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;display:block}
    .tx-acc{font-size:11px;color:#888;margin-top:2px;display:block}
    .tx-btns{display:flex;gap:2px;align-items:center;flex-shrink:0}
    .tx-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:4px;line-height:1}
    .tx-del:hover{color:#c62828}
    .empty-msg{text-align:center;color:#aaa;padding:24px;font-size:13px}

    /* Fixed expenses */
    .fixed-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
    .fixed-card h2{font-size:15px;font-weight:700;margin-bottom:10px}
    .fixed-item{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;gap:8px}
    .fixed-item:last-child{border-bottom:none}
    .fixed-name{font-size:13px}
    .fixed-amount{font-size:13px;text-align:center;font-variant-numeric:tabular-nums;font-weight:600;color:#c62828}
    .sub-badge{font-size:10px;background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:10px;margin-left:6px}
    .fixed-total-row{display:grid;grid-template-columns:1fr 1fr auto;padding:8px 0 2px;border-top:2px solid #eee;margin-top:4px;font-weight:700;font-size:14px;gap:8px}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:24px;width:min(460px,94vw);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
    .modal h2{font-size:17px;font-weight:700;margin-bottom:16px}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
    .modal-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
    .modal-list-item:last-child{border-bottom:none}
    .modal-list-item .item-info{font-size:13px}
    .modal-list-item .item-btns{display:flex;gap:6px}
    .color-preview{width:20px;height:20px;border-radius:50%;border:1px solid #ccc;display:inline-block;vertical-align:middle;margin-right:6px}
    input[type="color"]{width:40px;height:34px;border:1px solid #ddd;border-radius:6px;cursor:pointer;padding:2px}

    /* Chart */
    .chart-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
    .chart-card h2{font-size:15px;font-weight:700;margin-bottom:10px}
    .chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .chart-bar-label{width:70px;font-size:12px;text-align:right;color:#555;flex-shrink:0}
    .chart-bar-wrap{flex:1;height:20px;background:#f0f0f0;border-radius:10px;overflow:hidden}
    .chart-bar-fill{height:100%;border-radius:10px;transition:width .4s}
    .chart-bar-val{width:60px;font-size:12px;text-align:right;color:#333;font-weight:600;flex-shrink:0}

    /* Transfer history */
    .transfer-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5}
    .transfer-item:last-child{border-bottom:none}
    .transfer-arrow{color:#888;font-size:14px}
    .transfer-acc{font-size:12px;font-weight:600}
    .transfer-amount{font-size:14px;font-weight:700;color:#0277BD;margin-left:auto}
    .transfer-meta{font-size:11px;color:#aaa;margin-left:8px}

    /* Scrollable tabs content */
    .section-title{font-size:13px;font-weight:700;color:#1565C0;padding:8px 16px 4px;text-transform:uppercase;letter-spacing:.5px}

    /* Toast */
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
    #toast.show{opacity:1}

    /* ===== 禁煙チャレンジ ===== */
    .smoking-section{padding:0 16px 16px}
    .smoking-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
    .smoking-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .smoking-header h2{font-size:16px;font-weight:700;color:#2E7D32}
    .smoking-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .smoking-stat{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:10px;padding:14px;text-align:center}
    .smoking-stat.savings-stat{background:linear-gradient(135deg,#E3F2FD,#BBDEFB)}
    .smoking-stat .stat-num{font-size:28px;font-weight:700;color:#1B5E20;line-height:1.1}
    .smoking-stat.savings-stat .stat-num{color:#0D47A1}
    .smoking-stat .stat-label{font-size:11px;color:#555;margin-top:4px;font-weight:600}
    .smoking-stat .stat-savings-neg{color:#c62828}
    .milestone-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .milestone-badge{font-size:20px;opacity:.25;filter:grayscale(1);transition:all .3s;cursor:default;position:relative}
    .milestone-badge.achieved{opacity:1;filter:none}
    .milestone-badge[title]:hover::after{content:attr(title);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:3px 7px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10;pointer-events:none}
    .progress-wrap{margin-bottom:14px}
    .progress-label{font-size:11px;color:#666;margin-bottom:4px}
    .progress-bar-bg{height:10px;background:#e0e0e0;border-radius:10px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#4CAF50,#81C784);border-radius:10px;transition:width .6s ease}
    .smoking-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .smoke-btn{padding:14px 10px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;transition:all .15s;line-height:1.3}
    .smoke-btn-free{background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff}
    .smoke-btn-free:hover{background:linear-gradient(135deg,#1B5E20,#2E7D32)}
    .smoke-btn-bought{background:linear-gradient(135deg,#B71C1C,#E53935);color:#fff}
    .smoke-btn-bought:hover{background:linear-gradient(135deg,#7F0000,#B71C1C)}
    .smoke-btn-chat{width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#F57F17,#FFA000);color:#fff;transition:all .15s}
    .smoke-btn-chat:hover{background:linear-gradient(135deg,#E65100,#F57F17)}
    .smoking-done-badge{text-align:center;padding:10px;background:#E8F5E9;border-radius:8px;font-size:13px;font-weight:600;color:#2E7D32;margin-bottom:10px}
    .smoking-done-badge.bought{background:#FFEBEE;color:#c62828}
    .cost-history-section{border-top:1px solid #f0f0f0;padding-top:10px;margin-top:4px}
    .cost-history-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666;padding:3px 0}
    /* Chat modal */
    .chat-modal{width:min(480px,96vw);max-height:85vh;display:flex;flex-direction:column;padding:0}
    .chat-modal-header{padding:16px 20px 12px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
    .chat-modal-header h2{font-size:16px;font-weight:700;color:#E65100}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:350px}
    .chat-msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5}
    .chat-msg.user{background:#1565C0;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .chat-msg.bot{background:#F5F5F5;color:#333;align-self:flex-start;border-bottom-left-radius:4px}
    .chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #eee}
    .chat-input-row input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:13px;outline:none}
    .chat-input-row input:focus{border-color:#FFA000}
    .chat-send-btn{background:#FFA000;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer}
    .smoking-section-hidden{display:none}
  </style>
</head>
<body>

<header>
  <h1>💰 家計管理 v3</h1>
  <div class="header-btns">
    <button class="btn btn-outline btn-sm" onclick="openImportModal()">取込</button>
    <button class="btn btn-outline btn-sm" onclick="openCatModal()">カテゴリ</button>
    <button class="btn btn-outline btn-sm" onclick="openFixedModal()">固定費</button>
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">CSV</button>
    <button class="btn btn-outline btn-sm" id="smokingNavBtn" onclick="toggleSmokingSection()">🚭禁煙</button>
  </div>
</header>

<!-- Period bar -->
<div class="period-bar">
  <button onclick="shiftPeriod(-1)">◀</button>
  <div>
    <div class="period-label" id="periodLabel">―</div>
    <div class="period-sub" id="periodSub">―</div>
  </div>
  <button onclick="shiftPeriod(1)">▶</button>
  <button onclick="gotoToday()" style="margin-left:auto">今日</button>
</div>

<!-- Account strip -->
<div class="account-strip" id="accountStrip">
  <div class="add-acc-card" onclick="openAccModal()" title="口座を追加">＋</div>
</div>

<!-- Summary -->
<div class="summary-section" id="summarySection"></div>

<!-- Input form -->
<div class="main">
  <div class="input-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('income',this)">収入</button>
      <button class="tab-btn" onclick="switchTab('expense',this)">支出</button>
      <button class="tab-btn" onclick="switchTab('transfer',this)">送金</button>
    </div>

    <!-- Income tab -->
    <div class="tab-pane active" id="tab-income">
      <div class="form-row">
        <div class="form-group sm"><label>日付</label><input type="date" id="inc-date"></div>
        <div class="form-group"><label>口座</label>
          <select id="inc-acc"></select>
        </div>
        <div class="form-group"><label>カテゴリ</label>
          <select id="inc-cat"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>金額（円）</label><input type="number" id="inc-amount" placeholder="0" min="0"></div>
        <div class="form-group"><label>メモ</label><input type="text" id="inc-memo" placeholder="任意"></div>
        <button class="submit-btn" onclick="addTransaction('income')">追加</button>
      </div>
    </div>

    <!-- Expense tab -->
    <div class="tab-pane" id="tab-expense">
      <div class="form-row">
        <div class="form-group sm"><label>日付</label><input type="date" id="exp-date"></div>
        <div class="form-group"><label>口座</label>
          <select id="exp-acc"></select>
        </div>
        <div class="form-group"><label>カテゴリ</label>
          <select id="exp-cat"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>金額（円）</label><input type="number" id="exp-amount" placeholder="0" min="0"></div>
        <div class="form-group"><label>メモ</label><input type="text" id="exp-memo" placeholder="任意"></div>
        <button class="submit-btn" onclick="addTransaction('expense')">追加</button>
      </div>
    </div>

    <!-- Transfer tab -->
    <div class="tab-pane" id="tab-transfer">
      <div class="form-row">
        <div class="form-group sm"><label>日付</label><input type="date" id="tr-date"></div>
        <div class="form-group"><label>送金元口座</label>
          <select id="tr-from"></select>
        </div>
        <div class="form-group"><label>送金先口座</label>
          <select id="tr-to"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>金額（円）</label><input type="number" id="tr-amount" placeholder="0" min="0"></div>
        <div class="form-group"><label>メモ</label><input type="text" id="tr-memo" placeholder="任意"></div>
        <button class="submit-btn" onclick="addTransaction('transfer')">追加</button>
      </div>
    </div>
  </div><!-- /input-card -->

  <!-- Transaction list -->
  <div class="list-card">
    <div class="list-header">
      <h2>履歴</h2>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('all',this)">全て</button>
        <button class="filter-btn" onclick="setFilter('income',this)">収入</button>
        <button class="filter-btn" onclick="setFilter('expense',this)">支出</button>
        <button class="filter-btn" onclick="setFilter('transfer',this)">送金</button>
      </div>
    </div>
    <div id="txList"></div>
  </div>

  <!-- Category chart -->
  <div class="chart-card">
    <h2>支出カテゴリ別</h2>
    <div id="categoryChart"></div>
  </div>

  <!-- Fixed expenses -->
  <div class="fixed-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2>固定費</h2>
      <button class="btn btn-primary btn-sm" onclick="openFixedModal()">編集</button>
    </div>
    <div id="fixedList"></div>
  </div>

</div><!-- /main -->

<!-- ===== 禁煙チャレンジ セクション ===== -->
<div class="smoking-section smoking-section-hidden" id="smokingSection">
  <div class="smoking-card">
    <div class="smoking-header">
      <h2>🚭 禁煙チャレンジ</h2>
      <button class="btn btn-sm" style="color:#888;border:1px solid #ddd;background:#fff" onclick="openSmokingSetupModal()">⚙ 設定</button>
    </div>
    <!-- Stats -->
    <div class="smoking-stats">
      <div class="smoking-stat">
        <div class="stat-num" id="smokingDaysNum">—</div>
        <div class="stat-label">禁煙日数</div>
      </div>
      <div class="smoking-stat savings-stat">
        <div class="stat-num" id="smokingSavingsNum">—</div>
        <div class="stat-label">節約額</div>
      </div>
    </div>
    <!-- Streak -->
    <div style="text-align:center;font-size:12px;color:#555;margin-bottom:10px" id="smokingStreakLabel"></div>
    <!-- Milestones -->
    <div class="milestone-row" id="milestonesRow"></div>
    <!-- Progress bar -->
    <div class="progress-wrap" id="smokingProgressWrap">
      <div class="progress-label" id="smokingProgressLabel"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="smokingProgressFill" style="width:0%"></div></div>
    </div>
    <!-- Today status -->
    <div id="smokingTodayStatus"></div>
    <!-- Action buttons -->
    <div class="smoking-actions" id="smokingActionBtns">
      <button class="smoke-btn smoke-btn-free" onclick="checkInSmokeFree()">✅ 今日も禁煙できた！</button>
      <button class="smoke-btn smoke-btn-bought" onclick="openBoughtModal()">🚬 タバコを買ってしまった</button>
    </div>
    <!-- Consult button -->
    <button class="smoke-btn-chat" onclick="openChatModal()">💬 吸いたい...相談する</button>
    <!-- Cost history -->
    <div class="cost-history-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:12px;font-weight:600;color:#666">タバコ代履歴</span>
        <button class="btn btn-sm" style="font-size:11px;border:1px solid #ddd;background:#fff;color:#555" onclick="openCostChangeModal()">変更</button>
      </div>
      <div id="costHistoryList"></div>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const SK = 'kakeibo_v3';
const DEFAULT_ACCOUNTS = [
  {id:'a1',name:'給与口座',     owner:'自分',color:'#1565C0',initBalance:0},
  {id:'a3',name:'妻・給与口座', owner:'妻',  color:'#880E4F',initBalance:0},
];
const DEFAULT_INCOME_CATS = ['給与','賞与','副業','妻・給与','妻・賞与','ソーラー','その他収入'];
const DEFAULT_EXPENSE_CATS = ['食費','日用品費','交際費','美容','コンビニ','車両・ガソリン','娯楽','医療費','衣類','通信費','光熱費','家賃','その他'];
const OWNER_COLORS = {自分:'#1565C0',妻:'#880E4F',共有:'#2E7D32',その他:'#555'};

let app = {accounts:[], transactions:[], fixedExpenses:[], incomeCategories:[], expenseCategories:[]};
let currentPeriod = {year:0, month:0};
let txFilter = 'all';
let currentCatTab = 'income';

function loadData(){
  const s = localStorage.getItem(SK);
  if(s) app = JSON.parse(s);
  if(!app.accounts || app.accounts.length===0) app.accounts = DEFAULT_ACCOUNTS.map(a=>({...a}));
  if(!app.transactions) app.transactions = [];
  if(!app.fixedExpenses) app.fixedExpenses = [];
  if(!app.incomeCategories || app.incomeCategories.length===0) app.incomeCategories = [...DEFAULT_INCOME_CATS];
  if(!app.expenseCategories || app.expenseCategories.length===0) app.expenseCategories = [...DEFAULT_EXPENSE_CATS];
}
function saveData(){ localStorage.setItem(SK, JSON.stringify(app)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(n){ return Number(n).toLocaleString('ja-JP')+'円'; }
function ds(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ==================== HOLIDAY / PERIOD ====================
function calcHolidays(year){
  const h = new Set();
  const add = (m,d) => h.add(`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  // Fixed
  [[1,1],[2,11],[2,23],[4,29],[5,3],[5,4],[5,5],[8,11],[11,3],[11,23]].forEach(([m,d])=>add(m,d));
  // Spring/Autumn equinox
  const sp = Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4));
  const au = Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4));
  add(3,sp); add(9,au);
  // Floating: nthWeekday(year,month,weekday0=Mon..6=Sun,nth)
  function nthMon(m,n){
    let d=new Date(year,m-1,1); let cnt=0;
    while(d.getMonth()===m-1){if(d.getDay()===1){cnt++;if(cnt===n)return d.getDate();}d.setDate(d.getDate()+1);}
    return -1;
  }
  add(1,nthMon(1,2)); add(7,nthMon(7,3)); add(9,nthMon(9,3)); add(10,nthMon(10,2));
  // 振替休日
  const arr = [...h].sort();
  arr.forEach(s=>{
    const d = new Date(s+'T00:00:00');
    if(d.getDay()===0){
      let next = new Date(d); next.setDate(next.getDate()+1);
      while(h.has(ds(next))){ next.setDate(next.getDate()+1); }
      h.add(ds(next));
    }
  });
  return h;
}
const holidayCache = {};
function isHoliday(dateStr){
  const y = parseInt(dateStr.slice(0,4));
  if(!holidayCache[y]) holidayCache[y]=calcHolidays(y);
  return holidayCache[y].has(dateStr);
}
function isWeekendOrHoliday(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return d.getDay()===0||d.getDay()===6||isHoliday(dateStr);
}
function getPeriodStart(year,month){
  let d = new Date(year,month-1,25);
  let s = ds(d);
  while(isWeekendOrHoliday(s)){d.setDate(d.getDate()-1);s=ds(d);}
  return s;
}
function getPeriodEnd(year,month){
  let ny=year,nm=month+1;
  if(nm>12){ny++;nm=1;}
  const ns = new Date(getPeriodStart(ny,nm)+'T00:00:00');
  ns.setDate(ns.getDate()-1);
  return ds(ns);
}
function dateInPeriod(dateStr,year,month){
  return dateStr>=getPeriodStart(year,month)&&dateStr<=getPeriodEnd(year,month);
}
function todayPeriod(){
  const t = ds(new Date());
  // determine which budget month today belongs to
  // if today >= start of current calendar month's period → use current month
  // else use previous month
  const now = new Date();
  let y=now.getFullYear(),m=now.getMonth()+1;
  if(t<getPeriodStart(y,m)){m--;if(m<1){m=12;y--;}}
  return {year:y,month:m};
}

// ==================== INIT ====================
function init(){
  loadData();
  const p = todayPeriod();
  currentPeriod = p;
  setTodayDates();
  renderAll();
}

function setTodayDates(){
  const t = ds(new Date());
  ['inc-date','exp-date','tr-date'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value = t;
  });
}

// ==================== ACCOUNTS ====================
function accById(id){ return app.accounts.find(a=>a.id===id); }
function getBalance(accId){
  const acc = accById(accId);
  let bal = acc?(acc.initBalance||0):0;
  for(const t of app.transactions){
    if(t.type==='income'  &&t.accountId===accId) bal+=t.amount;
    if(t.type==='expense' &&t.accountId===accId) bal-=t.amount;
    if(t.type==='transfer'&&t.fromId===accId)    bal-=t.amount;
    if(t.type==='transfer'&&t.toId===accId)      bal+=t.amount;
  }
  return bal;
}
function renderAccountStrip(){
  const strip = document.getElementById('accountStrip');
  let html = '';
  app.accounts.forEach(a=>{
    const bal = getBalance(a.id);
    const ownerColor = OWNER_COLORS[a.owner]||'#555';
    html += `<div class="acc-card" style="background:${a.color}" title="${a.name} (${a.owner})">
      <div class="acc-owner">${a.owner}</div>
      <div class="acc-name">${a.name}</div>
      <div class="acc-bal">${bal.toLocaleString('ja-JP')}<span> 円</span></div>
    </div>`;
  });
  html += `<div class="add-acc-card" onclick="openAccModal()" title="口座を追加">＋</div>`;
  strip.innerHTML = html;
}

function renderSummary(){
  const {year,month} = currentPeriod;
  const start = getPeriodStart(year,month);
  const end = getPeriodEnd(year,month);
  const txPeriod = app.transactions.filter(t=>t.date>=start&&t.date<=end);

  // Per-owner aggregation
  const owners = ['自分','妻','共有','その他'];
  const ownerData = {};
  owners.forEach(o=>ownerData[o]={income:0,expense:0});

  txPeriod.forEach(t=>{
    if(t.type==='income'){
      const acc=accById(t.accountId); if(acc) ownerData[acc.owner].income+=t.amount;
    } else if(t.type==='expense'){
      const acc=accById(t.accountId); if(acc) ownerData[acc.owner].expense+=t.amount;
    }
  });

  // 送金履歴（新: expense/income category='送金' + 旧: type='transfer'）
  const transferExp = txPeriod.filter(t=>t.type==='expense'&&t.category==='送金');
  const transferOld = txPeriod.filter(t=>t.type==='transfer');
  const transferTotal = transferExp.reduce((s,t)=>s+t.amount,0) + transferOld.reduce((s,t)=>s+t.amount,0);

  const totalInc = txPeriod.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const varExp = txPeriod.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const fixedTotal = app.fixedExpenses.reduce((s,f)=>s+f.amount,0);
  const totalExp = varExp + fixedTotal;
  const balance = totalInc - totalExp;

  let html = '';

  // Self + Wife summary（変動支出のみ。固定費はどちらにも帰属しないため合計欄に表示）
  ['自分','妻'].forEach(owner=>{
    const d = ownerData[owner];
    const net = d.income - d.expense;
    const color = OWNER_COLORS[owner];
    html += `<div class="summary-card">
      <h3 style="color:${color}">● ${owner}</h3>
      <div class="summary-row"><span>収入</span><span class="amount-pos">+${d.income.toLocaleString('ja-JP')}円</span></div>
      <div class="summary-row"><span>変動支出</span><span class="amount-neg">-${d.expense.toLocaleString('ja-JP')}円</span></div>
      <div class="summary-row"><span>収支</span><span class="${net>=0?'amount-pos':'amount-neg'}">${net>=0?'+':'-'}${Math.abs(net).toLocaleString('ja-JP')}円</span></div>
    </div>`;
  });

  // Combined + transfer
  html += `<div class="summary-card">
    <h3>📊 期間合計</h3>
    <div class="summary-row"><span>収入合計</span><span class="amount-pos">+${totalInc.toLocaleString('ja-JP')}円</span></div>
    <div class="summary-row"><span>変動支出</span><span class="amount-neg">-${varExp.toLocaleString('ja-JP')}円</span></div>
    <div class="summary-row"><span>固定費</span><span class="amount-neg">-${fixedTotal.toLocaleString('ja-JP')}円</span></div>
    <div class="summary-row"><span>支出合計</span><span class="amount-neg">-${totalExp.toLocaleString('ja-JP')}円</span></div>
    <div class="summary-row"><span>収支</span><span class="${balance>=0?'amount-pos':'amount-neg'}">${balance>=0?'+':'-'}${Math.abs(balance).toLocaleString('ja-JP')}円</span></div>
  </div>`;

  html += `<div class="summary-card">
    <h3>💸 送金履歴（期間内）</h3>`;
  if(transferExp.length===0 && transferOld.length===0){
    html += `<div style="color:#aaa;font-size:13px;padding:8px 0">送金なし</div>`;
  } else {
    // 新形式: expense category='送金'
    transferExp.slice().reverse().forEach(t=>{
      const fr = accById(t.accountId)||{name:'?'};
      html += `<div class="transfer-item">
        <span class="transfer-acc">${fr.name}</span>
        <span class="transfer-arrow">→</span>
        <span class="transfer-acc">送金先</span>
        <span class="transfer-amount">${t.amount.toLocaleString('ja-JP')}円</span>
        <span class="transfer-meta">${t.date}${t.memo?' '+t.memo:''}</span>
      </div>`;
    });
    // 旧形式: type='transfer'
    transferOld.slice().reverse().forEach(t=>{
      const fr = accById(t.fromId)||{name:'?'};
      const to = accById(t.toId)||{name:'?'};
      html += `<div class="transfer-item">
        <span class="transfer-acc">${fr.name}</span>
        <span class="transfer-arrow">→</span>
        <span class="transfer-acc">${to.name}</span>
        <span class="transfer-amount">${t.amount.toLocaleString('ja-JP')}円</span>
        <span class="transfer-meta">${t.date}${t.memo?' '+t.memo:''}</span>
      </div>`;
    });
    html += `<div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:700;font-size:13px">
      <span>合計</span><span>${transferTotal.toLocaleString('ja-JP')}円</span>
    </div>`;
  }
  html += `</div>`;

  document.getElementById('summarySection').innerHTML = html;
}

// ==================== PERIOD ====================
function renderPeriodBar(){
  const {year,month} = currentPeriod;
  const start = getPeriodStart(year,month);
  const end = getPeriodEnd(year,month);
  document.getElementById('periodLabel').textContent = `${year}�t${month}月度`;
  document.getElementById('periodSub').textContent = `${start} 〜 ${end}`;
}
function shiftPeriod(d){
  let {year,month} = currentPeriod;
  month+=d;
  if(month>12){month=1;year++;}
  if(month<1){month=12;year--;}
  currentPeriod={year,month};
  renderAll();
}
function gotoToday(){
  currentPeriod = todayPeriod();
  renderAll();
}

// ==================== TRANSACTIONS ====================
function addTransaction(type){
  if(type==='income'){
    const date=document.getElementById('inc-date').value;
    const accId=document.getElementById('inc-acc').value;
    const cat=document.getElementById('inc-cat').value;
    const amount=parseInt(document.getElementById('inc-amount').value)||0;
    const memo=document.getElementById('inc-memo').value.trim();
    if(!date||!accId||amount<=0){showToast('日付・口座・金額を入力してください');return;}
    app.transactions.push({id:uid(),date,type:'income',accountId:accId,category:cat,amount,memo});
    document.getElementById('inc-amount').value='';
    document.getElementById('inc-memo').value='';
  } else if(type==='expense'){

function renderTxList(){
  const {year,month} = currentPeriod;
  const start = getPeriodStart(year,month);
  const end = getPeriodEnd(year,month);
  let txs = app.transactions.filter(t=>t.date>=start&&t.date<=end);
  if(txFilter==='transfer') txs=txs.filter(t=>t.type==='transfer'||t.category==='送金');
  else if(txFilter!=='all') txs=txs.filter(t=>t.type===txFilter&&t.category!=='送金');
  txs = txs.slice().sort((a,b)=>b.date.localeCompare(a.date));

  const el = document.getElementById('txList');
  if(txs.length===0){el.innerHTML='<div class="empty-msg">この期間の履歴はありません</div>';return;}

  el.innerHTML = txs.map(t=>{
    let icon='💸',iconCls='expense',amtCls='amount-neg',amtPfx='-',info='',accStr='';
    if(t.type==='income'){icon='💰';iconCls='income';amtCls='amount-pos';amtPfx='+';}
    if(t.type==='transfer'){icon='↔️';iconCls='transfer';amtCls='amount-neutral';amtPfx='';}
    if(t.type==='income'||t.type==='expense'){
      const acc=accById(t.accountId);
      accStr=acc?`${acc.owner} / ${acc.name}`:'';
      info=`${t.date} ${t.memo||''}`;
    } else {
      const fr=accById(t.fromId)||{name:'?'};
      const to=accById(t.toId)||{name:'?'};
      accStr=`${fr.name} → ${to.name}`;
      info=`${t.date} ${t.memo||''}`;
    }
    return `<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon ${iconCls}">${icon}</div>
        <div class="tx-info">
          <div class="tx-cat">${t.category||'送金'}</div>
          <div class="tx-meta">${info}</div>
        </div>
      </div>
      <div class="tx-right">
        <span class="tx-amount ${amtCls}">${amtPfx}${t.amount.toLocaleString('ja-JP')}円</span>
        <span class="tx-acc">${accStr}</span>
      </div>
      <div class="tx-btns">
        <button class="tx-del" onclick="openEditTx('${t.id}')" title="編集" style="color:#90CAF9">✎</button>
        <button class="tx-del" onclick="deleteTransaction('${t.id}')" title="削除">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderChart(){

  const el = document.getElementById('categoryChart');

  const colors = ['#1565C0','#0277BD','#00838F','#2E7D32','#558B2F','#F57F17','#E65100','#BF360C','#880E4F','#6A1B9A','#283593','#4E342E'];
  el.innerHTML = sorted.map(([cat,amt],i)=>`
    <div class="chart-bar-row">
      <div class="chart-bar-label">${cat}</div>
      <div class="chart-bar-wrap"><div class="chart-bar-fill" style="width:${Math.round(amt/max*100)}%;background:${colors[i%colors.length]}"></div></div>
      <div class="chart-bar-val">${amt.toLocaleString('ja-JP')}円</div>

}

  if (!Array.isArray(parsed) || parsed.length===0) { showToast('データがありません'); return; }

function exportCSV(){
  const {year,month} = currentPeriod;
  const start = getPeriodStart(year,month);
  const end = getPeriodEnd(year,month);
  const txs = app.transactions.filter(t=>t.date>=start&&t.date<=end)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const rows = [['日付','種別','口座/送金元','口座/送金先','カテゴリ','金額','メモ']];
  txs.forEach(t=>{
    if(t.type==='transfer'){
      const fr=accById(t.fromId)||{name:''};
      const to=accById(t.toId)||{name:''};
      rows.push([t.date,'送金',fr.name,to.name,'',t.amount,t.memo||'']);
    } else {
      const acc=accById(t.accountId)||{name:''};
      rows.push([t.date,t.type==='income'?'収入':'支出',acc.name,'',t.category||'',t.amount,t.memo||'']);
    }
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download=`家計管理_${year}年${month}月度.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadSmokingData(){
  const s = localStorage.getItem(SMOKING_SK);
  smokingData = s ? JSON.parse(s) : null;
}

function saveSmokingData(){
  localStorage.setItem(SMOKING_SK, JSON.stringify(smokingData));
}

function todayStr(){
  return ds(new Date());
}

function getCostForDate(date){
  if(!smokingData || !smokingData.costHistory || smokingData.costHistory.length === 0) return 0;
  const applicable = smokingData.costHistory.filter(h => h.date <= date)
    .sort((a,b) => b.date.localeCompare(a.date));
  return applicable[0] ? applicable[0].cost : 0;
}

function calcSmokingDays(){
  if(!smokingData) return 0;
  const start = new Date(smokingData.startDate + 'T00:00:00');
  const today = new Date(todayStr() + 'T00:00:00');
  return Math.max(0, Math.floor((today - start) / 86400000) + 1);
}

function calcSmokingSavings(){
  if(!smokingData) return 0;
  let savings = 0;
  (smokingData.checkIns || []).forEach(ci => {
    const cost = getCostForDate(ci.date);
    if(ci.smokeFree) savings += cost;
    else savings -= ci.amount;
  });
  return savings;
}

function getSmokingStreak(){
  if(!smokingData) return 0;
  const checkIns = (smokingData.checkIns || []).filter(c => c.smokeFree)
    .map(c => c.date).sort((a,b) => b.localeCompare(a));
  if(checkIns.length === 0) return 0;
  let streak = 0;
  let cursor = new Date(todayStr() + 'T00:00:00');
  for(let i = 0; i < 365; i++){
    const d = ds(cursor);
    if(checkIns.includes(d)){
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else {
      // allow today to be unchecked yet
      if(i === 0){ cursor.setDate(cursor.getDate() - 1); continue; }
      break;
    }
  }
  return streak;
}

function getTodayCheckIn(){
  if(!smokingData) return null;
  return (smokingData.checkIns || []).find(c => c.date === todayStr()) || null;
}

function toggleSmokingSection(){
  smokingSectionVisible = !smokingSectionVisible;
  const sec = document.getElementById('smokingSection');
  if(smokingSectionVisible){
    sec.classList.remove('smoking-section-hidden');
    // If no data, open setup
    if(!smokingData){
      openSmokingSetupModal();
    } else {
      renderSmokingSection();
    }
    sec.scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    sec.classList.add('smoking-section-hidden');
  }
}

function renderSmokingSection(){
  if(!smokingData) return;
  const days = calcSmokingDays();
  const savings = calcSmokingSavings();
  const streak = getSmokingStreak();

  // Stats
  document.getElementById('smokingDaysNum').textContent = days + '日';
  const savEl = document.getElementById('smokingSavingsNum');
  if(savings >= 0){
    savEl.textContent = '¥' + savings.toLocaleString('ja-JP');
    savEl.className = 'stat-num';
  } else {
    savEl.textContent = '−¥' + Math.abs(savings).toLocaleString('ja-JP');
    savEl.className = 'stat-num stat-savings-neg';
  }

  // Streak
  document.getElementById('smokingStreakLabel').textContent =
    streak > 0 ? `🔥 連続禁煙 ${streak}日` : '';

  // Milestones
  const row = document.getElementById('milestonesRow');
  row.innerHTML = '';
  MILESTONES.forEach(m => {
    const span = document.createElement('span');
    span.className = 'milestone-badge' + (days >= m.days ? ' achieved' : '');
    span.textContent = m.icon;
    span.title = `${m.label}（${m.days}日）`;
    row.appendChild(span);
  });

  // Progress bar - find next milestone
  const nextMilestone = MILESTONES.find(m => m.days > days);
  const prevMilestone = [...MILESTONES].reverse().find(m => m.days <= days);
  if(nextMilestone){
    const base = prevMilestone ? prevMilestone.days : 0;
    const pct = Math.min(100, ((days - base) / (nextMilestone.days - base)) * 100);
    document.getElementById('smokingProgressLabel').textContent =
      `次の目標「${nextMilestone.label}」まであと${nextMilestone.days - days}日`;
    document.getElementById('smokingProgressFill').style.width = pct + '%';
    document.getElementById('smokingProgressWrap').style.display = '';
  } else {
    document.getElementById('smokingProgressWrap').style.display = 'none';
  }

  // Today status
  const todayCI = getTodayCheckIn();
  const statusEl = document.getElementById('smokingTodayStatus');
  const actionsEl = document.getElementById('smokingActionBtns');
  if(todayCI){
    if(todayCI.smokeFree){
      statusEl.innerHTML = '<div class="smoking-done-badge">✅ 今日は禁煙できました！</div>';
    } else {
      statusEl.innerHTML = `<div class="smoking-done-badge bought">🚬 今日はタバコを購入しました（¥${todayCI.amount.toLocaleString('ja-JP')}）</div>`;
    }
    actionsEl.style.display = 'none';
  } else {
    statusEl.innerHTML = '';
    actionsEl.style.display = '';
  }

  // Cost history
  const histEl = document.getElementById('costHistoryList');
  histEl.innerHTML = '';
  (smokingData.costHistory || []).slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(h => {
    const row = document.createElement('div');
    row.className = 'cost-history-row';
    row.innerHTML = `<span>${h.date}</span><span>¥${h.cost.toLocaleString('ja-JP')}/日</span>`;
    histEl.appendChild(row);
  });
}

// ===== セットアップ =====
function openSmokingSetupModal(){
  const today = todayStr();
  if(smokingData){
    document.getElementById('setup-startDate').value = smokingData.startDate;
    document.getElementById('setup-dailyCost').value = getCostForDate(today) || '';
  } else {
    document.getElementById('setup-startDate').value = today;
    document.getElementById('setup-dailyCost').value = '';
  }
  document.getElementById('smokingSetupModal').classList.add('open');
}

function saveSmokingSetup(){
  const startDate = document.getElementById('setup-startDate').value;
  const dailyCost = parseInt(document.getElementById('setup-dailyCost').value, 10);
  if(!startDate){ showToast('開始日を入力してください'); return; }
  if(isNaN(dailyCost) || dailyCost < 0){ showToast('タバコ代を入力してください'); return; }
  if(!smokingData){
    smokingData = { startDate, costHistory: [{date: startDate, cost: dailyCost}], checkIns: [] };
  } else {
    smokingData.startDate = startDate;
    // update initial cost if no history or update first entry
    if(!smokingData.costHistory || smokingData.costHistory.length === 0){
      smokingData.costHistory = [{date: startDate, cost: dailyCost}];
    } else {
      smokingData.costHistory[0].cost = dailyCost;
    }
  }
  saveSmokingData();
  closeModal('smokingSetupModal');
  renderSmokingSection();
  showToast('禁煙チャレンジを開始しました！💪');
}

// ===== チェックイン =====
function checkInSmokeFree(){
  if(!smokingData){ openSmokingSetupModal(); return; }
  const today = todayStr();
  if(getTodayCheckIn()){ showToast('今日はすでに記録済みです'); return; }
  smokingData.checkIns.push({date: today, smokeFree: true, amount: 0});
  saveSmokingData();
  renderSmokingSection();
  const savings = calcSmokingSavings();
  showToast(`禁煙達成！今日も${getCostForDate(today).toLocaleString('ja-JP')}円節約！合計¥${savings.toLocaleString('ja-JP')}`);
}

function openBoughtModal(){
  if(!smokingData){ openSmokingSetupModal(); return; }
  const cost = getCostForDate(todayStr());
  document.getElementById('bought-amount').value = cost || '';
  document.getElementById('smokingBoughtModal').classList.add('open');
}

function checkInBought(){
  const amount = parseInt(document.getElementById('bought-amount').value, 10);
  if(isNaN(amount) || amount < 0){ showToast('金額を入力してください'); return; }
  const today = todayStr();
  // Remove existing today check-in if any
  smokingData.checkIns = smokingData.checkIns.filter(c => c.date !== today);
  smokingData.checkIns.push({date: today, smokeFree: false, amount});
  saveSmokingData();
  closeModal('smokingBoughtModal');
  renderSmokingSection();
  showToast('記録しました。また明日から頑張りましょう！');
}

// ===== タバコ代変更 =====
function openCostChangeModal(){
  document.getElementById('costChange-date').value = todayStr();
  document.getElementById('costChange-amount').value = getCostForDate(todayStr()) || '';
  document.getElementById('costChangeModal').classList.add('open');
}

function saveCostChange(){
  const date = document.getElementById('costChange-date').value;
  const cost = parseInt(document.getElementById('costChange-amount').value, 10);
  if(!date){ showToast('変更日を入力してください'); return; }
  if(isNaN(cost) || cost < 0){ showToast('金額を入力してください'); return; }
  if(!smokingData){ showToast('先に禁煙チャレンジを設定してください'); return; }
  // Remove existing entry for same date, then add new
  smokingData.costHistory = smokingData.costHistory.filter(h => h.date !== date);
  smokingData.costHistory.push({date, cost});
  smokingData.costHistory.sort((a,b) => a.date.localeCompare(b.date));
  saveSmokingData();
  closeModal('costChangeModal');
  renderSmokingSection();
  showToast(`${date}から¥${cost.toLocaleString('ja-JP')}/日に変更しました`);
}

// ===== 相談チャット =====
let chatHistory = [];

function openChatModal(){
  chatHistory = [];
  const messages = document.getElementById('chatMessages');
  messages.innerHTML = '';
  const days = calcSmokingDays();
  const savings = calcSmokingSavings();
  const greeting = `こんにちは！禁煙サポートチャットです😊 ${smokingData ? `現在${days}日間禁煙中で¥${savings.toLocaleString('ja-JP')}節約できています！` : ''} どんな気持ちですか？話してみてください。`;
  appendChatMsg('bot', greeting);
  document.getElementById('smokingChatModal').classList.add('open');
  setTimeout(() => document.getElementById('chatInput').focus(), 100);
}

function appendChatMsg(role, text){
  const el = document.createElement('div');
  el.className = 'chat-msg ' + role;
  el.textContent = text;
  const container = document.getElementById('chatMessages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  appendChatMsg('user', text);
  input.value = '';
  // Bot reply (preset, random pick with variable substitution)
  setTimeout(() => {
    const days = calcSmokingDays();
    const savings = calcSmokingSavings();
    const templates = CHAT_MESSAGES;
    const tmpl = templates[Math.floor(Math.random() * templates.length)];
    const reply = tmpl
      .replace(/{days}/g, days + '日')
      .replace(/{savings}/g, '¥' + Math.abs(savings).toLocaleString('ja-JP'));
    appendChatMsg('bot', reply);
  }, 400 + Math.random() * 300);
}

// Init smoking data on load
loadSmokingData();
</script>
